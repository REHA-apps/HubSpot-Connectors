name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run Pyright
        run: uv run pyright

      - name: Run tests
        env:
          ENV: dev
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_KEY: placeholder-key
          HUBSPOT_CLIENT_ID: placeholder-id
          HUBSPOT_CLIENT_SECRET: placeholder-secret
          SLACK_CLIENT_ID: placeholder-id
          SLACK_CLIENT_SECRET: placeholder-secret
          SLACK_SIGNING_SECRET: placeholder-secret
          API_BASE_URL: http://localhost:8000
        run: uv run pytest -q

      - name: Lowercase repo name
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Build Docker image
        run: docker build -t ghcr.io/${{ env.REPO_LOWER }}:latest .

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        if: github.ref == 'refs/heads/main'
        run: docker push ghcr.io/${{ env.REPO_LOWER }}:latest

  deploy:
    needs: lint-test-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Render
        # You can add a Render Deploy Hook here later
        # Example: run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: echo "To automate deployment, add RENDER_DEPLOY_HOOK_URL to GitHub Secrets and use curl."
