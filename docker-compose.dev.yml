services:
  app:
    build: .
    env_file:
      - .env
    volumes:
      - .:/app
      - ./logs:/app/logs
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - app
    restart: always
