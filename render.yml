services:
  - type: web
    name: hubspot-slack-connector
    env: docker
    plan: free # Change to starter later to remove the 15m sleep
    region: oregon # Or your preferred region
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        sync: false # You will paste your Supabase URL in the Render UI
      - key: HUBSPOT_CLIENT_SECRET
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: PORT
        value: 80 # Nginx will listen here
