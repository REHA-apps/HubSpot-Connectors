services:
  - type: web
    name: hubspot-slack-connector
    env: docker
    plan: free # Change to starter later to remove the 15m sleep
    region: oregon # Or your preferred region
    healthCheckPath: /api/health
    envVars:
      - key: ENV
        value: prod
      - key: SUPABASE_URL
        sync: false # Set in Render UI
      - key: SUPABASE_KEY
        sync: false
      - key: HUBSPOT_CLIENT_ID
        sync: false
      - key: HUBSPOT_CLIENT_SECRET
        sync: false
      - key: HUBSPOT_APP_ID
        sync: false
      - key: HUBSPOT_REDIRECT_URI
        sync: false
      - key: SLACK_CLIENT_ID
        sync: false
      - key: SLACK_CLIENT_SECRET
        sync: false
      - key: SLACK_REDIRECT_URI
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PORT
        value: 10000 # Render default, although Dockerfile is EXPOSE 8000
